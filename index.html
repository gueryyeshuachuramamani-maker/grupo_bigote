<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Gran Caballero CSS</title>
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.card {
    background: white;
    border-radius: 20px;
    width: 920px;
    height: 710px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 25px 70px rgba(0,0,0,0.6);
}

/* =============================================
   SOMBRERO DE COPA
   ============================================= */

/* Corona del sombrero */
.hat-crown {
    position: absolute;
    width: 248px;
    height: 185px;
    background: #111;
    top: 14px;
    left: 471px; /* centro x: 595 */
    border-radius: 7px 7px 0 0;
    z-index: 5;
}

/* Ribete superior de la copa */
.hat-crown::before {
    content: '';
    position: absolute;
    width: 260px;
    height: 12px;
    background: #0a0a0a;
    top: 0;
    left: -6px;
    border-radius: 6px 6px 0 0;
}

/* Ala del sombrero */
.hat-brim {
    position: absolute;
    width: 338px;
    height: 26px;
    background: #111;
    top: 195px;
    left: 426px; /* centro x: 595 */
    border-radius: 5px;
    z-index: 5;
}

/* Sombra del ala */
.hat-brim::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 10px;
    right: 10px;
    height: 8px;
    background: rgba(0,0,0,0.3);
    filter: blur(4px);
    border-radius: 50%;
}

/* Cinta roja/granate */
.hat-band {
    position: absolute;
    width: 248px;
    height: 22px;
    background: #8B1A2F;
    top: 177px;
    left: 471px;
    z-index: 6;
}

/* Hebilla dorada de la cinta */
.hat-band::before {
    content: '';
    position: absolute;
    width: 22px;
    height: 16px;
    background: #C8A020;
    top: 3px;
    left: 8px;
    border-radius: 3px;
}

/* =============================================
   OJO IZQUIERDO (sin monóculo)
   ============================================= */

.eye-left {
    position: absolute;
    width: 82px;
    height: 82px;
    background: white;
    border: 4px solid #111;
    border-radius: 50%;
    top: 248px;
    left: 479px; /* centro x: 520 */
    z-index: 4;
}

/* Pupila */
.eye-left::after {
    content: '';
    position: absolute;
    width: 28px;
    height: 28px;
    background: #111;
    border-radius: 50%;
    top: 21px;
    left: 21px;
}

/* =============================================
   OJO DERECHO (con monóculo)
   ============================================= */

/* Aro dorado del monóculo — encima del ojo */
.monocle-ring {
    position: absolute;
    width: 96px;
    height: 96px;
    border: 7px solid #C8A020;
    border-radius: 50%;
    top: 245px;
    left: 612px; /* centro x: 660 */
    z-index: 6;
    background: transparent;
}

.eye-right {
    position: absolute;
    width: 82px;
    height: 82px;
    background: white;
    border: 4px solid #111;
    border-radius: 50%;
    top: 248px;
    left: 619px; /* centro x: 660 */
    z-index: 5;
}

/* Pupila */
.eye-right::after {
    content: '';
    position: absolute;
    width: 28px;
    height: 28px;
    background: #C8A020;
    border-radius: 50%;
    top: 21px;
    left: 21px;
}

/* Cadena del monóculo — segmento superior */
.monocle-chain-top {
    position: absolute;
    width: 4px;
    height: 100px;
    background: linear-gradient(to bottom, #D4A800, #A07820, #D4A800);
    border-radius: 2px;
    top: 335px;
    left: 693px;
    transform: rotate(22deg);
    transform-origin: top center;
    z-index: 4;
}

/* Curva inferior de la cadena */
.monocle-chain-bottom {
    position: absolute;
    width: 4px;
    height: 65px;
    background: linear-gradient(to bottom, #D4A800, #A07820);
    border-radius: 2px;
    top: 425px;
    left: 726px;
    transform: rotate(-15deg);
    transform-origin: top center;
    z-index: 4;
}

/* =============================================
   BIGOTE — NO MODIFICAR
   ============================================= */

.mustache {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    position: absolute;
    color: black;
    box-shadow: 
        150px 240px 0 0 currentColor,
        300px 240px 0 0 currentColor;
    top: 120px;
    left: 280px;
}

.mustache::before {
    content: '';
    position: absolute;
    left: 30px;
    top: 120px;
    width: 210px;
    height: 120px;
    border-bottom: solid 180px currentColor;
    border-radius: 0 0 0 100%;
    transform: rotate(-45deg);
    transform-origin: right 210px;
}

.mustache::after {
    content: '';
    position: absolute;
    left: 390px;
    top: 120px;
    width: 210px;
    height: 120px;
    border-bottom: solid 180px currentColor;
    border-radius: 0 0 100% 0;
    transform: rotate(40deg);
    transform-origin: left 210px;
}

/* =============================================
   PAJARITA / BOW TIE
   ============================================= */

.bowtie {
    position: absolute;
    top: 455px;
    left: 533px; /* centro x: 593 */
    width: 124px;
    height: 52px;
    z-index: 12;
}

/* Ala izquierda */
.bowtie-left {
    position: absolute;
    width: 0;
    height: 0;
    border-top: 26px solid transparent;
    border-bottom: 26px solid transparent;
    border-right: 56px solid #111;
    left: 0;
    top: 0;
}

/* Ala derecha */
.bowtie-right {
    position: absolute;
    width: 0;
    height: 0;
    border-top: 26px solid transparent;
    border-bottom: 26px solid transparent;
    border-left: 56px solid #111;
    right: 0;
    top: 0;
}

/* Nudo central */
.bowtie-knot {
    position: absolute;
    width: 16px;
    height: 32px;
    background: #111;
    left: 54px;
    top: 10px;
    border-radius: 4px;
}

/* =============================================
   BASTÓN / WALKING CANE
   ============================================= */

/* Empuñadura en J — arco dorado */
.cane-handle {
    position: absolute;
    width: 58px;
    height: 52px;
    border: 10px solid #C8A020;
    border-top: none;
    border-radius: 0 0 58px 58px;
    top: 428px;
    left: 387px;
    transform: rotate(-30deg);
    transform-origin: top right;
    z-index: 11;
}

/* Palo de madera diagonal */
.cane-stick {
    position: absolute;
    width: 10px;
    height: 270px;
    background: linear-gradient(to right, #7B3410, #5C2008, #8B4513, #6B3010);
    top: 452px;
    left: 413px;
    transform: rotate(36deg);
    transform-origin: top center;
    border-radius: 5px;
    z-index: 10;
}

/* Contera dorada (punta inferior del bastón) */
.cane-stick::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 22px;
    background: linear-gradient(to bottom, #D4A800, #A07800);
    bottom: -4px;
    left: -2px;
    border-radius: 3px 3px 6px 6px;
}

/* =============================================
   PERGAMINO / SCROLL BANNER
   ============================================= */

.banner {
    position: absolute;
    bottom: 28px;
    left: 115px;
    right: 90px;
    height: 66px;
    background: linear-gradient(to bottom, #fdf5de, #f5e8bc, #fdf5de);
    border-top: 2px solid #bbb;
    border-bottom: 2px solid #bbb;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
}

/* Enrrollado izquierdo del pergamino */
.banner::before {
    content: '';
    position: absolute;
    left: -27px;
    top: -2px;
    width: 30px;
    height: 70px;
    background: linear-gradient(to right, #dcc87a, #e8d590, #dcc87a);
    border: 2px solid #bbb;
    border-right: none;
    border-radius: 50% 0 0 50%;
    box-shadow: inset 4px 0 8px rgba(0,0,0,0.12);
}

/* Enrrollado derecho del pergamino */
.banner::after {
    content: '';
    position: absolute;
    right: -27px;
    top: -2px;
    width: 30px;
    height: 70px;
    background: linear-gradient(to left, #dcc87a, #e8d590, #dcc87a);
    border: 2px solid #bbb;
    border-left: none;
    border-radius: 0 50% 50% 0;
    box-shadow: inset -4px 0 8px rgba(0,0,0,0.12);
}

.banner-text {
    font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', serif;
    font-size: 20px;
    font-weight: bold;
    color: #1a1a1a;
    letter-spacing: 0.8px;
    z-index: 21;
    position: relative;
    white-space: nowrap;
}

</style>
</head>
<body>
<div class="card">

  <!-- Sombrero -->
  <div class="hat-crown"></div>
  <div class="hat-brim"></div>
  <div class="hat-band"></div>

  <!-- Ojo izquierdo -->
  <div class="eye-left"></div>

  <!-- Ojo derecho con monóculo -->
  <div class="monocle-ring"></div>
  <div class="eye-right"></div>
  <div class="monocle-chain-top"></div>
  <div class="monocle-chain-bottom"></div>

  <!-- Bigote (sin modificar) -->
  <div class="mustache"></div>

  <!-- Bastón -->
  <div class="cane-handle"></div>
  <div class="cane-stick"></div>

  <!-- Pajarita -->
  <div class="bowtie">
    <div class="bowtie-left"></div>
    <div class="bowtie-right"></div>
    <div class="bowtie-knot"></div>
  </div>

  <!-- Pergamino inferior -->
  <div class="banner">
    <span class="banner-text">Proyecto de Equipo: El Gran Caballero CSS</span>
  </div>

</div>
</body>
</html>
